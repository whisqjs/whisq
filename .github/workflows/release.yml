name: Release

# Step 2 of the release flow: publish on push to `main`.
#
# Triggered when the release PR (opened by `release-prepare.yml`) merges
# into `main`. This workflow:
#
#   1. Re-runs build + test as a safety net.
#   2. Invokes `pnpm run release` via changesets/action — publishes all
#      bumped packages to npm with provenance, creates per-package git tags,
#      and creates a GitHub Release for each tag.
#   3. Opens a back-merge PR from `main` into `develop` so `develop` picks
#      up the version bumps and CHANGELOG entries.
#
# If there are no unpublished packages (e.g. workflow fires from an
# unrelated push), changesets/action detects that and skips publishing.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Mint WHISQ_BOT app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.WHISQ_BOT_APP_ID }}
          private-key: ${{ secrets.WHISQ_BOT_PRIVATE_KEY }}
          owner: whisqjs
          repositories: whisq

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Version consistency
        run: node scripts/check-versions.mjs

      - name: Check bundle size
        run: cd packages/core && pnpm size

      - name: Record current @whisq/core version
        id: ver
        run: echo "version=$(node -p "require('./packages/core/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish to npm + create tags + GitHub Releases
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # WHISQ-140 — warn-only: verify that unpkg's @latest alias for
      # @whisq/core/dist/public-api.json has propagated to the version we
      # just published. The alias is CDN-cached and can lag the npm
      # registry by minutes to hours; AI tools that resolve "the current
      # Whisq API" through @latest will silently read the previous
      # version during that window. This check surfaces the lag in the
      # release-run logs. `continue-on-error: true` keeps the release
      # green while we characterise how long the propagation window is
      # in practice — promote to a failing check once observed stable.
      - name: Verify unpkg @latest propagation (warn-only)
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set +e
          URL="https://unpkg.com/@whisq/core@latest/dist/public-api.json"
          echo "Fetching $URL — expecting version=$VERSION"
          SERVED=$(curl -sSfL --max-time 30 "$URL" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{process.stdout.write(JSON.parse(s).version||'')}catch{process.stdout.write('')}})")
          if [ -z "$SERVED" ]; then
            echo "::warning title=unpkg @latest propagation::Could not read version from $URL — CDN may be serving an older payload or is unreachable."
            exit 0
          fi
          if [ "$SERVED" = "$VERSION" ]; then
            echo "unpkg @latest is already serving $VERSION — propagation complete."
          else
            echo "::warning title=unpkg @latest propagation::npm registry published $VERSION, but $URL still serves $SERVED. AI tools resolving @latest will see the old version until the CDN cache refreshes."
          fi

  backmerge:
    needs: publish
    if: needs.publish.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Mint WHISQ_BOT app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.WHISQ_BOT_APP_ID }}
          private-key: ${{ secrets.WHISQ_BOT_PRIVATE_KEY }}
          owner: whisqjs
          repositories: whisq

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Create back-merge branch and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          git config user.name "whisq-bot[bot]"
          git config user.email "whisq-bot[bot]@users.noreply.github.com"
          BRANCH="chore/backmerge-main-to-develop-v$VERSION"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: back-merge main → develop after v$VERSION" \
            --label "skip-changeset" \
            --body "Automated back-merge following the v$VERSION release. Bringing version bumps and CHANGELOG updates from \`main\` into \`develop\` so future feature branches start from the released state."
