name: Notify docs on release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag
        required: true
        default: test-dispatch

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Echo with env
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          echo "release_tag='${RELEASE_TAG}' input_tag='${INPUT_TAG}'"
